<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule Your Interview | AMS Landscaping</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f4f7f4;color:#1a2e1a;min-height:100vh}
    .site-header{background:#2d7a3a;color:white;padding:14px 24px;text-align:center;font-size:13px;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
    .site-header a{color:rgba(255,255,255,.85);text-decoration:none}
    .hero{background:linear-gradient(135deg,#2d7a3a 0%,#1e5428 100%);color:white;text-align:center;padding:52px 24px 44px}
    .hero h1{font-size:clamp(26px,5vw,38px);font-weight:800;letter-spacing:-.02em;line-height:1.15;margin-bottom:14px}
    .hero p{font-size:16px;color:rgba(255,255,255,.82);max-width:500px;margin:0 auto;line-height:1.6}
    .info-bar{background:white;border-bottom:1px solid #e0e8e0;padding:16px 24px}
    .info-bar-inner{display:flex;justify-content:center;gap:36px;flex-wrap:wrap;max-width:700px;margin:0 auto}
    .info-item{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:#2d7a3a}
    .info-item svg{flex-shrink:0}
    .content{max-width:780px;margin:0 auto;padding:36px 20px 60px}
    .day-card{background:white;border-radius:14px;border:1px solid #dde8dd;margin-bottom:20px;overflow:hidden;box-shadow:0 1px 4px rgba(45,122,58,.06)}
    .day-header{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid #eef3ee;background:#f8fbf8}
    .date-badge{background:#2d7a3a;color:white;border-radius:10px;padding:8px 14px;text-align:center;min-width:56px}
    .date-badge .month{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.85}
    .date-badge .day-num{font-size:22px;font-weight:800;line-height:1;margin-top:2px}
    .day-info{flex:1}
    .day-info .weekday{font-size:17px;font-weight:700;color:#1a2e1a}
    .day-info .slot-count{font-size:12px;color:#6b8f6b;margin-top:2px;font-weight:500}
    .slots-grid{display:flex;flex-wrap:wrap;gap:10px;padding:18px 20px}
    .slot-btn{background:#f0f8f1;border:1.5px solid #c5ddc7;color:#1e5428;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s ease}
    .slot-btn:hover{background:#2d7a3a;border-color:#2d7a3a;color:white;transform:translateY(-1px);box-shadow:0 4px 12px rgba(45,122,58,.25)}
    .slot-btn:active{transform:translateY(0)}
    .empty-state{background:white;border-radius:14px;border:1px solid #dde8dd;padding:56px 32px;text-align:center;color:#6b8f6b}
    .empty-state p{font-size:16px;line-height:1.6}
    .empty-state a{color:#2d7a3a;font-weight:600}
    .page-footer{text-align:center;font-size:12px;color:#92a892;padding:0 24px 40px}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,30,10,.55);z-index:1000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
    .modal-overlay.open{display:flex}
    .modal{background:white;border-radius:18px;padding:36px 32px 32px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:slideUp .2s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .modal-icon{width:52px;height:52px;background:#e8f5e9;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
    .modal h2{font-size:20px;font-weight:800;color:#1a2e1a;margin-bottom:8px}
    .modal .selected-time{font-size:24px;font-weight:800;color:#2d7a3a;margin-bottom:6px}
    .modal .selected-date{font-size:14px;color:#6b8f6b;margin-bottom:28px;font-weight:500}
    .modal-actions{display:flex;flex-direction:column;gap:10px}
    .btn-primary{background:#2d7a3a;color:white;border:none;border-radius:10px;padding:14px 20px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:background .15s}
    .btn-primary:hover{background:#1e5428}
    .btn-secondary{background:transparent;color:#6b8f6b;border:1.5px solid #dde8dd;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s}
    .btn-secondary:hover{border-color:#2d7a3a;color:#2d7a3a}
    @media(max-width:520px){.info-bar-inner{gap:20px}.modal{padding:28px 20px 24px}}
  </style>
</head>
<body>
<header class="site-header">AMS Landscaping &middot; <a href="https://azlawns.com" target="_blank">azlawns.com</a></header>
<div class="hero"><h1>Schedule Your Interview</h1><p>Pick any available time below. These slots are confirmed open for both interviewers.</p></div>
<div class="info-bar"><div class="info-bar-inner">
  <div class="info-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>30 minutes</div>
  <div class="info-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Zoom link sent after booking</div>
  <div class="info-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Appointment Setter Role</div>
</div></div>
<div class="content" id="slots-container"></div>
<div class="page-footer" id="footer-note"></div>
<div class="modal-overlay" id="modal-overlay"><div class="modal">
  <div class="modal-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#2d7a3a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
  <h2>You selected</h2>
  <div class="selected-time" id="modal-time"></div>
  <div class="selected-date" id="modal-date"></div>
  <div class="modal-actions">
    <button class="btn-primary" id="btn-continue">Continue to Book &rarr;</button>
    <button class="btn-secondary" id="btn-back">Go back</button>
  </div>
</div></div>
<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
<script>
const availableSlots=[
  {date:'2026-03-26',times:['1:15 PM']},
  {date:'2026-03-30',times:['10:30 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','1:00 PM','1:30 PM','2:00 PM','2:30 PM','3:00 PM','4:00 PM']},
  {date:'2026-03-31',times:['10:30 AM','11:00 AM','11:30 AM','12:00 PM','4:00 PM']},
  {date:'2026-04-01',times:['9:00 AM','9:30 AM','10:00 AM','10:30 AM','11:30 AM','12:00 PM','12:30 PM','1:00 PM','1:30 PM','3:30 PM']},
  {date:'2026-04-02',times:['4:00 PM','4:30 PM']},
  {date:'2026-04-06',times:['10:00 AM','10:30 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','1:00 PM','1:30 PM','2:00 PM','2:30 PM','4:00 PM','4:30 PM']},
  {date:'2026-04-07',times:['10:30 AM','1:30 PM','2:00 PM','2:30 PM','4:00 PM','4:30 PM']},
  {date:'2026-04-08',times:['9:00 AM','9:30 AM','10:00 AM','10:30 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','1:00 PM','1:30 PM']},
  {date:'2026-04-09',times:['9:30 AM','10:00 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','1:00 PM','1:30 PM','2:00 PM','2:30 PM','4:00 PM']},
];
const WD=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function pD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function renderSlots(){
  const c=document.getElementById('slots-container');
  const t=new Date();t.setHours(0,0,0,0);
  const f=availableSlots.filter(s=>pD(s.date)>=t);
  if(!f.length){c.innerHTML='<div class="empty-state"><p>No open slots right now — check back soon or reach out at <a href="https://azlawns.com">azlawns.com</a></p></div>';return;}
  c.innerHTML=f.map(({date,times})=>{
    const d=pD(date),w=WD[d.getDay()],ms=MS[d.getMonth()],dn=d.getDate(),mf=MN[d.getMonth()],ct=times.length;
    const btns=times.map(t=>`<button class="slot-btn" data-time="${t}" data-date="${w}, ${mf} ${dn}">${t}</button>`).join('');
    return `<div class="day-card"><div class="day-header"><div class="date-badge"><div class="month">${ms}</div><div class="day-num">${dn}</div></div><div class="day-info"><div class="weekday">${w}</div><div class="slot-count">${ct} open slot${ct!==1?'s':''}</div></div></div><div class="slots-grid">${btns}</div></div>`;
  }).join('');
  c.querySelectorAll('.slot-btn').forEach(b=>b.addEventListener('click',()=>openModal(b.dataset.time,b.dataset.date)));
}
function openModal(time,date){document.getElementById('modal-time').textContent=time;document.getElementById('modal-date').textContent=date;document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
document.getElementById('btn-back').addEventListener('click',closeModal);
document.getElementById('btn-continue').addEventListener('click',()=>{closeModal();const now=new Date();const ms=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;const url=`https://calendly.com/d/cxyz-jtx-662/setter-interview?month=${ms}`;if(window.Calendly&&typeof Calendly.initPopupWidget==='function'){Calendly.initPopupWidget({url});}else{window.open(url,'_blank');}});
document.getElementById('footer-note').textContent='Times shown in Phoenix, AZ (MST) · Availability as of March 26, 2026';
renderSlots();
</script>
</body>
</html>
