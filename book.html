<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schedule Your Interview · AMS Landscaping</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />
<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
<style>
  :root {
    --brand: #2d7a3a;
    --brand-dark: #1f5528;
    --brand-light: #e8f5ec;
    --brand-lighter: #f4faf5;
    --ink: #0f1a14;
    --ink-2: #3c4a41;
    --ink-3: #6b7a72;
    --line: #e2ebe5;
    --bg: #fbfdfb;
    --white: #ffffff;
    --radius: 14px;
    --radius-lg: 20px;
    --shadow-sm: 0 1px 2px rgba(15,26,20,0.04), 0 1px 3px rgba(15,26,20,0.06);
    --shadow-md: 0 4px 14px rgba(15,26,20,0.06), 0 2px 4px rgba(15,26,20,0.04);
    --shadow-lg: 0 12px 40px rgba(15,26,20,0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .container { max-width: 920px; margin: 0 auto; padding: 48px 24px 80px; }
  .label {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--brand-light);
    color: var(--brand-dark);
    font-size: 13px; font-weight: 600;
    padding: 6px 12px; border-radius: 999px;
    letter-spacing: 0.02em;
    margin-bottom: 20px;
  }
  .label .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brand); }
  h1 {
    font-size: clamp(32px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0 0 14px;
    color: var(--ink);
  }
  .subtitle {
    font-size: 17px;
    color: var(--ink-2);
    margin: 0 0 32px;
    max-width: 620px;
  }
  .info-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 28px;
    padding: 16px 20px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 32px;
    box-shadow: var(--shadow-sm);
  }
  .info-item {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 14px; color: var(--ink-2); font-weight: 500;
  }
  .info-item svg { color: var(--brand); flex-shrink: 0; }
  .days { display: flex; flex-direction: column; gap: 18px; }
  .day-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s ease;
  }
  .day-card:hover { box-shadow: var(--shadow-md); }
  .day-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .date-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 60px; height: 60px;
    background: var(--brand-light);
    border-radius: 12px;
    flex-shrink: 0;
  }
  .date-badge .day-num {
    font-size: 22px; font-weight: 800; color: var(--brand-dark); line-height: 1;
  }
  .date-badge .month {
    font-size: 11px; font-weight: 600; color: var(--brand-dark);
    letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px;
  }
  .day-info { flex: 1; min-width: 0; }
  .weekday {
    font-size: 18px; font-weight: 700; color: var(--ink); margin: 0 0 2px;
  }
  .slot-count {
    font-size: 13px; color: var(--ink-3); margin: 0;
  }
  .times-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
  }
  .time-btn {
    background: var(--white);
    border: 1.5px solid var(--line);
    color: var(--ink);
    font-family: inherit;
    font-size: 15px; font-weight: 600;
    padding: 13px 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }
  .time-btn:hover {
    border-color: var(--brand);
    background: var(--brand-light);
    color: var(--brand-dark);
    transform: translateY(-1px);
  }
  .time-btn:focus-visible {
    outline: 3px solid rgba(45, 122, 58, 0.35);
    outline-offset: 2px;
  }
  .empty-state {
    background: var(--white);
    border: 1px dashed var(--line);
    border-radius: var(--radius-lg);
    padding: 56px 24px;
    text-align: center;
    color: var(--ink-2);
  }
  .empty-state h3 {
    font-size: 20px; font-weight: 700; margin: 0 0 8px; color: var(--ink);
  }
  .empty-state p { font-size: 15px; margin: 0; }
  .empty-state a { color: var(--brand-dark); font-weight: 600; text-decoration: none; }
  .empty-state a:hover { text-decoration: underline; }
  .footer-note {
    text-align: center;
    font-size: 13px;
    color: var(--ink-3);
    margin-top: 40px;
  }
  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(15, 26, 20, 0.55);
    display: none;
    align-items: center; justify-content: center;
    z-index: 1000;
    padding: 20px;
    animation: fadeIn 0.15s ease;
  }
  .modal-backdrop.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .modal {
    background: var(--white);
    border-radius: var(--radius-lg);
    max-width: 440px;
    width: 100%;
    padding: 32px;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.2s ease;
  }
  .modal-icon {
    width: 56px; height: 56px;
    background: var(--brand-light);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    color: var(--brand);
  }
  .modal h2 {
    font-size: 22px; font-weight: 700; margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .modal-time {
    font-size: 16px; color: var(--ink-2); margin: 0 0 24px;
  }
  .modal-time strong { color: var(--ink); font-weight: 600; }
  .modal-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-primary {
    background: var(--brand);
    color: var(--white);
    border: none;
    font-family: inherit;
    font-size: 15px; font-weight: 600;
    padding: 13px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-secondary {
    background: transparent;
    color: var(--ink-2);
    border: none;
    font-family: inherit;
    font-size: 14px; font-weight: 500;
    padding: 10px;
    cursor: pointer;
    border-radius: 8px;
  }
  .btn-secondary:hover { background: var(--brand-lighter); color: var(--ink); }
  @media (max-width: 560px) {
    .container { padding: 32px 16px 60px; }
    .day-card { padding: 20px; }
    .info-bar { gap: 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="label"><span class="dot"></span>AMS Landscaping · azlawns.com</div>
  <h1>Schedule Your Interview</h1>
  <p class="subtitle">Pick any available time below. These slots are confirmed open for both interviewers.</p>

  <div class="info-bar">
    <span class="info-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      30 minutes
    </span>
    <span class="info-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Zoom link sent after booking
    </span>
    <span class="info-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Appointment Setter Role
    </span>
  </div>

  <div id="days" class="days"></div>

  <p class="footer-note">Times shown in Phoenix, AZ (MST) · Availability as of April 20, 2026</p>
</div>

<div id="modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </div>
    <h2 id="modal-title">Confirm your time</h2>
    <p class="modal-time" id="modal-time"></p>
    <div class="modal-actions">
      <button class="btn-primary" id="continue-btn">Continue to Book →</button>
      <button class="btn-secondary" id="back-btn">Go back</button>
    </div>
  </div>
</div>

<script>
const availableSlots = [
  {
    "date": "2026-04-21",
    "times": [
      "10:30 AM",
      "12:00 PM",
      "2:30 PM"
    ]
  },
  {
    "date": "2026-04-22",
    "times": [
      "1:00 PM",
      "1:30 PM",
      "3:30 PM",
      "4:00 PM"
    ]
  },
  {
    "date": "2026-04-23",
    "times": [
      "9:30 AM",
      "3:30 PM",
      "4:00 PM"
    ]
  },
  {
    "date": "2026-04-24",
    "times": [
      "11:00 AM",
      "11:30 AM",
      "12:00 PM",
      "12:30 PM",
      "2:00 PM",
      "2:30 PM",
      "3:00 PM",
      "3:30 PM",
      "4:00 PM",
      "4:30 PM"
    ]
  },
  {
    "date": "2026-04-27",
    "times": [
      "9:00 AM",
      "9:30 AM",
      "10:00 AM",
      "10:30 AM",
      "12:30 PM",
      "2:00 PM",
      "2:30 PM",
      "3:00 PM",
      "4:00 PM"
    ]
  },
  {
    "date": "2026-04-28",
    "times": [
      "11:30 AM"
    ]
  },
  {
    "date": "2026-05-04",
    "times": [
      "9:00 AM",
      "9:30 AM",
      "11:00 AM",
      "11:30 AM",
      "12:00 PM",
      "12:30 PM",
      "1:00 PM",
      "1:30 PM",
      "2:00 PM",
      "2:30 PM"
    ]
  }
];

const daysEl = document.getElementById('days');
const modal = document.getElementById('modal');
const modalTime = document.getElementById('modal-time');
const continueBtn = document.getElementById('continue-btn');
const backBtn = document.getElementById('back-btn');
let currentMonth = null;

const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function formatDateBadge(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return {
    dayNum: d,
    month: MONTHS_SHORT[m-1],
    weekday: WEEKDAYS[dt.getDay()],
    monthKey: dateStr.slice(0,7)
  };
}

function todayStrPhoenix() {
  const now = new Date();
  const utcMs = now.getTime() + now.getTimezoneOffset()*60000;
  const az = new Date(utcMs + (-7)*3600*1000);
  const y = az.getFullYear();
  const m = String(az.getMonth()+1).padStart(2,'0');
  const d = String(az.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function renderDays() {
  const today = todayStrPhoenix();
  const future = availableSlots.filter(s => s.date >= today && s.times && s.times.length);
  if (!future.length) {
    daysEl.innerHTML = `
      <div class="empty-state">
        <h3>No open slots right now</h3>
        <p>Check back soon or reach out at <a href="https://azlawns.com">azlawns.com</a></p>
      </div>`;
    return;
  }
  daysEl.innerHTML = future.map(s => {
    const b = formatDateBadge(s.date);
    const count = s.times.length;
    const btns = s.times.map(t =>
      `<button class="time-btn" data-time="${t}" data-date="${s.date}" data-month="${b.monthKey}">${t}</button>`
    ).join('');
    return `
      <div class="day-card">
        <div class="day-header">
          <div class="date-badge">
            <span class="day-num">${b.dayNum}</span>
            <span class="month">${b.month}</span>
          </div>
          <div class="day-info">
            <h2 class="weekday">${b.weekday}</h2>
            <p class="slot-count">${count} ${count === 1 ? 'opening' : 'openings'} available</p>
          </div>
        </div>
        <div class="times-grid">${btns}</div>
      </div>`;
  }).join('');

  document.querySelectorAll('.time-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const time = btn.dataset.time;
      const date = btn.dataset.date;
      const month = btn.dataset.month;
      const [y,m,d] = date.split('-').map(Number);
      const dt = new Date(y, m-1, d);
      const longDate = dt.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      modalTime.innerHTML = `<strong>${longDate}</strong> at <strong>${time}</strong>`;
      currentMonth = month;
      modal.classList.add('show');
    });
  });
}

function closeModal() {
  modal.classList.remove('show');
  currentMonth = null;
}

continueBtn.addEventListener('click', () => {
  const url = `https://calendly.com/d/cxyz-jtx-662/setter-interview?month=${currentMonth}`;
  closeModal();
  if (window.Calendly && typeof window.Calendly.initPopupWidget === 'function') {
    window.Calendly.initPopupWidget({ url });
  } else {
    window.open(url, '_blank', 'noopener');
  }
});

backBtn.addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

renderDays();
</script>
</body>
</html>
