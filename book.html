<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Your Interview | AMS Landscaping</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f0f4f0;color:#1a1a1a;min-height:100vh}
.header{background:linear-gradient(135deg,#2d7a3a 0%,#1e5c28 100%);color:#fff;padding:48px 24px 40px;text-align:center}
.header .brand{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;opacity:.85;margin-bottom:12px}
.header h1{font-size:clamp(28px,5vw,42px);font-weight:800;margin-bottom:10px;line-height:1.15}
.header .subtitle{font-size:16px;opacity:.88;max-width:520px;margin:0 auto;line-height:1.5}
.info-bar{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;padding:20px 24px;background:#fff;border-bottom:1px solid #e0e0e0}
.info-item{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:#444}
.info-item svg{width:18px;height:18px;color:#2d7a3a;flex-shrink:0}
.container{max-width:820px;margin:0 auto;padding:32px 20px 60px}
.day-card{background:#fff;border-radius:14px;padding:24px 28px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.day-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.date-badge{background:#2d7a3a;color:#fff;border-radius:10px;padding:8px 14px;font-weight:700;font-size:14px;line-height:1;white-space:nowrap}
.day-name{font-size:18px;font-weight:700;color:#1a1a1a}
.slot-count{font-size:13px;color:#777;margin-left:auto}
.slots{display:flex;flex-wrap:wrap;gap:10px}
.slot-btn{background:#f0f8f1;border:1.5px solid #c4dfc8;color:#2d7a3a;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;padding:10px 20px;border-radius:10px;cursor:pointer;transition:all .15s ease}
.slot-btn:hover{background:#2d7a3a;color:#fff;border-color:#2d7a3a;transform:translateY(-1px);box-shadow:0 3px 10px rgba(45,122,58,.25)}
.empty-state{text-align:center;padding:60px 24px;background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.empty-state p{font-size:17px;color:#666;line-height:1.6}
.footer-note{text-align:center;font-size:13px;color:#999;margin-top:12px;padding:0 20px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:18px;padding:36px 32px;max-width:420px;width:100%;text-align:center;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:22px;font-weight:700;margin-bottom:6px;color:#1a1a1a}
.modal .selected-time{font-size:17px;color:#2d7a3a;font-weight:600;margin-bottom:24px}
.modal .cta{display:inline-block;background:#2d7a3a;color:#fff;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;padding:14px 36px;border-radius:12px;border:none;cursor:pointer;transition:background .15s ease;text-decoration:none}
.modal .cta:hover{background:#236b2e}
.modal .back-btn{display:block;margin-top:14px;font-size:14px;color:#888;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif}
.modal .back-btn:hover{color:#555}
@media(max-width:600px){.info-bar{gap:16px;padding:16px}.day-card{padding:18px 20px}.slots{gap:8px}.slot-btn{padding:9px 16px;font-size:14px}}
</style>
</head>
<body>
<div class="header">
<div class="brand">AMS Landscaping &middot; azlawns.com</div>
<h1>Schedule Your Interview</h1>
<p class="subtitle">Pick any available time below. These slots are confirmed open for both interviewers.</p>
</div>
<div class="info-bar">
<div class="info-item"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>30 minutes</div>
<div class="info-item"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4z"/></svg>Zoom link sent after booking</div>
<div class="info-item"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Appointment Setter Role</div>
</div>
<div class="container" id="slotsContainer"></div>
<p class="footer-note">Times shown in Phoenix, AZ (MST) &middot; Availability as of April 06, 2026</p>

<div class="modal-overlay" id="modalOverlay">
<div class="modal">
<h2>Confirm Your Time</h2>
<p class="selected-time" id="selectedTime"></p>
<button class="cta" id="ctaBtn">Continue to Book &rarr;</button>
<button class="back-btn" id="backBtn">Go back</button>
</div>
</div>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
<script>
const availableSlots = [
  { date: '2026-04-06', times: ['10:00 AM','10:30 AM','12:00 PM','1:30 PM','2:00 PM','2:30 PM','4:00 PM'] },
  { date: '2026-04-13', times: ['4:00 PM'] },
  { date: '2026-04-14', times: ['10:00 AM','10:30 AM','11:00 AM','11:30 AM','12:00 PM','1:30 PM','4:00 PM'] },
  { date: '2026-04-15', times: ['9:00 AM','9:30 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','1:30 PM','2:00 PM','2:30 PM'] },
  { date: '2026-04-20', times: ['10:00 AM','10:30 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','1:00 PM','1:30 PM','2:00 PM','2:30 PM'] }
];

const container = document.getElementById('slotsContainer');
const overlay = document.getElementById('modalOverlay');
const selectedTimeEl = document.getElementById('selectedTime');
const ctaBtn = document.getElementById('ctaBtn');
const backBtn = document.getElementById('backBtn');

const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

function render(){
  const today=todayStr();
  const future=availableSlots.filter(s=>s.date>=today);
  if(!future.length){
    container.innerHTML='<div class="empty-state"><p>No open slots right now — check back soon or reach out at azlawns.com</p></div>';
    return;
  }
  container.innerHTML='';
  future.forEach(day=>{
    const parts=day.date.split('-');
    const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
    const dayName=days[d.getDay()];
    const monthName=months[d.getMonth()];
    const card=document.createElement('div');
    card.className='day-card';
    const slotsHtml=day.times.map(t=>'<button class="slot-btn" data-date="'+day.date+'" data-time="'+t+'">'+t+'</button>').join('');
    card.innerHTML='<div class="day-header"><span class="date-badge">'+monthName+' '+d.getDate()+'</span><span class="day-name">'+dayName+'</span><span class="slot-count">'+day.times.length+' slot'+(day.times.length>1?'s':'')+'</span></div><div class="slots">'+slotsHtml+'</div>';
    container.appendChild(card);
  });
  document.querySelectorAll('.slot-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      const dt=this.dataset.date;
      const tm=this.dataset.time;
      const parts=dt.split('-');
      const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
      selectedTimeEl.textContent=days[d.getDay()]+', '+months[d.getMonth()]+' '+d.getDate()+' at '+tm+' MST';
      ctaBtn.dataset.month=dt.substring(0,7);
      overlay.classList.add('active');
    });
  });
}

overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.classList.remove('active')});
backBtn.addEventListener('click',function(){overlay.classList.remove('active')});
ctaBtn.addEventListener('click',function(){
  const url='https://calendly.com/d/cxyz-jtx-662/setter-interview?month='+this.dataset.month;
  if(window.Calendly&&Calendly.initPopupWidget){Calendly.initPopupWidget({url:url});overlay.classList.remove('active')}
  else{window.open(url,'_blank')}
});

render();
</script>
</body>
</html>
