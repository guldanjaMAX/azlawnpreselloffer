<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Your Interview | AMS Landscaping</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f5f1;color:#1a2e1a;min-height:100vh}
.top-bar{background:#2d7a3a;color:#fff;text-align:center;padding:10px 16px;font-size:13px;font-weight:500;letter-spacing:.3px}
.top-bar a{color:#b6e6bf;text-decoration:none}
.hero{background:linear-gradient(135deg,#2d7a3a 0%,#1b5425 100%);color:#fff;padding:48px 24px 40px;text-align:center}
.hero h1{font-size:clamp(26px,5vw,38px);font-weight:800;margin-bottom:8px;line-height:1.15}
.hero p{font-size:clamp(14px,2.5vw,17px);opacity:.88;max-width:520px;margin:0 auto;line-height:1.5}
.info-bar{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;padding:20px 24px;background:#fff;border-bottom:1px solid #e2e8e3}
.info-item{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:#2d7a3a}
.info-item svg{width:18px;height:18px;flex-shrink:0}
.container{max-width:720px;margin:0 auto;padding:32px 20px 60px}
.day-card{background:#fff;border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.day-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.date-badge{background:#e8f5e9;color:#2d7a3a;font-weight:700;font-size:13px;padding:6px 12px;border-radius:8px;white-space:nowrap}
.day-name{font-size:18px;font-weight:700;color:#1a2e1a}
.slot-count{font-size:13px;color:#6b7c6b;margin-left:auto;white-space:nowrap}
.slots{display:flex;flex-wrap:wrap;gap:10px}
.slot-btn{background:#f0f5f1;border:2px solid #d4e5d6;color:#2d7a3a;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;padding:10px 20px;border-radius:10px;cursor:pointer;transition:all .15s ease}
.slot-btn:hover{background:#2d7a3a;color:#fff;border-color:#2d7a3a;transform:translateY(-1px);box-shadow:0 4px 12px rgba(45,122,58,.25)}
.slot-btn:active{transform:translateY(0)}
.footer-note{text-align:center;font-size:13px;color:#7a8a7a;margin-top:12px;line-height:1.6}
.empty-state{background:#fff;border-radius:14px;padding:48px 24px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.empty-state svg{width:48px;height:48px;color:#b0c4b0;margin-bottom:16px}
.empty-state p{font-size:16px;color:#5a6e5a;line-height:1.6}
.empty-state a{color:#2d7a3a;font-weight:600;text-decoration:none}

/* Modal */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-backdrop.active{display:flex}
.modal{background:#fff;border-radius:16px;padding:36px 32px 28px;max-width:400px;width:100%;text-align:center;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:20px;font-weight:700;color:#1a2e1a;margin-bottom:4px}
.modal .modal-time{font-size:16px;color:#2d7a3a;font-weight:600;margin-bottom:24px}
.modal .btn-book{display:inline-block;background:#2d7a3a;color:#fff;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;padding:14px 32px;border:none;border-radius:10px;cursor:pointer;transition:background .15s ease;width:100%}
.modal .btn-book:hover{background:#236b2e}
.modal .btn-back{display:block;margin-top:12px;font-size:14px;color:#7a8a7a;cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;width:100%;text-align:center}
.modal .btn-back:hover{color:#2d7a3a}
</style>
</head>
<body>
<div class="top-bar">AMS Landscaping &middot; <a href="https://azlawns.com" target="_blank">azlawns.com</a></div>
<div class="hero">
  <h1>Schedule Your Interview</h1>
  <p>Pick any available time below. These slots are confirmed open for both interviewers.</p>
</div>
<div class="info-bar">
  <div class="info-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    30 minutes
  </div>
  <div class="info-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
    Zoom link sent after booking
  </div>
  <div class="info-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Appointment Setter Role
  </div>
</div>
<div class="container" id="slots-container"></div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <h2>Confirm Your Time</h2>
    <p class="modal-time" id="modal-time"></p>
    <button class="btn-book" id="btn-book">Continue to Book &rarr;</button>
    <button class="btn-back" id="btn-back">Go back</button>
  </div>
</div>

<script>
const availableSlots = [
  { date: '2026-03-30', times: ['12:30 PM', '1:00 PM', '1:30 PM', '2:00 PM', '2:30 PM', '3:00 PM', '4:00 PM'] },
  { date: '2026-03-31', times: ['10:30 AM', '11:00 AM', '11:30 AM', '12:00 PM', '4:00 PM'] },
  { date: '2026-04-01', times: ['9:00 AM', '9:30 AM', '10:00 AM', '10:30 AM', '11:30 AM', '12:00 PM', '3:30 PM'] },
  { date: '2026-04-02', times: ['4:00 PM', '4:30 PM'] },
  { date: '2026-04-06', times: ['10:00 AM', '10:30 AM', '11:00 AM', '11:30 AM', '12:00 PM', '1:30 PM', '2:00 PM', '2:30 PM', '4:00 PM'] },
  { date: '2026-04-07', times: ['10:00 AM', '10:30 AM', '11:00 AM'] },
  { date: '2026-04-09', times: ['3:30 PM', '4:00 PM', '4:30 PM'] },
  { date: '2026-04-10', times: ['4:00 PM', '4:30 PM'] },
  { date: '2026-04-13', times: ['3:00 PM', '4:00 PM'] },
];

const WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function formatDateLabel(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return MONTHS[dt.getMonth()] + ' ' + d + ', ' + y;
}
function getWeekday(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  return WEEKDAYS[new Date(y, m-1, d).getDay()];
}

function render() {
  const container = document.getElementById('slots-container');
  const today = new Date();
  const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

  const filtered = availableSlots.filter(s => s.date >= todayStr);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><p>No open slots right now. Check back soon or reach out at <a href="https://azlawns.com">azlawns.com</a></p></div><p class="footer-note">Times shown in Phoenix, AZ (MST) &middot; Availability as of March 30, 2026</p>';
    return;
  }

  let html = '';
  filtered.forEach(day => {
    const label = formatDateLabel(day.date);
    const weekday = getWeekday(day.date);
    const count = day.times.length;
    html += '<div class="day-card">';
    html += '<div class="day-header">';
    html += '<span class="date-badge">' + label + '</span>';
    html += '<span class="day-name">' + weekday + '</span>';
    html += '<span class="slot-count">' + count + ' slot' + (count !== 1 ? 's' : '') + '</span>';
    html += '</div>';
    html += '<div class="slots">';
    day.times.forEach(t => {
      html += '<button class="slot-btn" data-date="' + label + '" data-weekday="' + weekday + '" data-time="' + t + '">' + t + '</button>';
    });
    html += '</div></div>';
  });
  html += '<p class="footer-note">Times shown in Phoenix, AZ (MST) &middot; Availability as of March 30, 2026</p>';
  container.innerHTML = html;
}

render();

let selectedDate = '';
let selectedTime = '';
let selectedMonth = '';

document.getElementById('slots-container').addEventListener('click', function(e) {
  if (!e.target.classList.contains('slot-btn')) return;
  selectedDate = e.target.dataset.date;
  selectedTime = e.target.dataset.time;
  const weekday = e.target.dataset.weekday;
  // extract month for calendly
  const parts = selectedDate.split(', ');
  // "April 1, 2026" -> month=2026-04
  const dParts = selectedDate.replace(',','').split(' ');
  const mIdx = MONTHS.indexOf(dParts[0]);
  const yr = dParts[2];
  selectedMonth = yr + '-' + String(mIdx+1).padStart(2,'0');

  document.getElementById('modal-time').textContent = weekday + ', ' + selectedDate + ' at ' + selectedTime;
  document.getElementById('modal-backdrop').classList.add('active');
});

document.getElementById('btn-back').addEventListener('click', function() {
  document.getElementById('modal-backdrop').classList.remove('active');
});
document.getElementById('modal-backdrop').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('active');
});

document.getElementById('btn-book').addEventListener('click', function() {
  const url = 'https://calendly.com/d/cxyz-jtx-662/setter-interview?month=' + selectedMonth;
  document.getElementById('modal-backdrop').classList.remove('active');
  if (window.Calendly && Calendly.initPopupWidget) {
    Calendly.initPopupWidget({url: url});
  } else {
    window.open(url, '_blank');
  }
});
</script>
<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
</body>
</html>
