<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Your Interview | AMS Landscaping</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#f0f4f0;color:#1a2e1a;min-height:100vh}
.top-bar{background:#2d7a3a;color:#fff;text-align:center;padding:10px 16px;font-size:13px;font-weight:500;letter-spacing:.3px}
.top-bar a{color:#b8e6c1;text-decoration:none}
.hero{background:linear-gradient(135deg,#2d7a3a 0%,#1b5e27 100%);color:#fff;padding:48px 24px 40px;text-align:center}
.hero h1{font-size:clamp(26px,5vw,38px);font-weight:800;margin-bottom:8px;letter-spacing:-.5px}
.hero p{font-size:clamp(14px,2.5vw,17px);opacity:.88;max-width:520px;margin:0 auto;line-height:1.5}
.info-bar{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;padding:20px 24px;background:#fff;border-bottom:1px solid #e2e8e2}
.info-item{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:#3a6b3a}
.info-item svg{width:18px;height:18px;flex-shrink:0}
.container{max-width:720px;margin:0 auto;padding:24px 16px 48px}
.day-card{background:#fff;border-radius:14px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;border:1px solid #e6ede6}
.day-header{display:flex;align-items:center;gap:14px;padding:18px 20px;border-bottom:1px solid #f0f4f0}
.date-badge{background:#edf7ef;color:#2d7a3a;border-radius:10px;width:52px;height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.date-badge .month{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;line-height:1}
.date-badge .day-num{font-size:22px;font-weight:800;line-height:1.1}
.day-info .weekday{font-size:16px;font-weight:700;color:#1a2e1a}
.day-info .slot-count{font-size:13px;color:#6b8f6b;margin-top:2px}
.slots-grid{display:flex;flex-wrap:wrap;gap:10px;padding:16px 20px 20px}
.slot-btn{background:#edf7ef;color:#2d7a3a;border:2px solid transparent;border-radius:10px;padding:10px 18px;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s ease}
.slot-btn:hover{background:#2d7a3a;color:#fff;transform:translateY(-1px);box-shadow:0 3px 10px rgba(45,122,58,.25)}
.slot-btn:active{transform:translateY(0)}
.empty-state{background:#fff;border-radius:14px;padding:48px 24px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e6ede6}
.empty-state svg{width:48px;height:48px;color:#b8d4ba;margin-bottom:16px}
.empty-state h2{font-size:20px;font-weight:700;color:#3a6b3a;margin-bottom:8px}
.empty-state p{font-size:15px;color:#6b8f6b;line-height:1.5}
.empty-state a{color:#2d7a3a;font-weight:600;text-decoration:none}
.footer-note{text-align:center;padding:16px;font-size:13px;color:#8a9f8a;line-height:1.5}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:18px;padding:32px 28px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative}
.modal h2{font-size:20px;font-weight:700;color:#1a2e1a;margin-bottom:6px}
.modal .selected-time{font-size:24px;font-weight:800;color:#2d7a3a;margin:12px 0}
.modal .selected-date{font-size:15px;color:#6b8f6b;margin-bottom:24px}
.modal .cta-btn{display:inline-flex;align-items:center;gap:8px;background:#2d7a3a;color:#fff;border:none;border-radius:12px;padding:14px 28px;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s ease;width:100%;justify-content:center}
.modal .cta-btn:hover{background:#236b2e;transform:translateY(-1px);box-shadow:0 4px 14px rgba(45,122,58,.3)}
.modal .back-btn{display:block;margin-top:14px;background:none;border:none;color:#6b8f6b;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;padding:8px}
.modal .back-btn:hover{color:#2d7a3a}
</style>
</head>
<body>
<div class="top-bar">AMS Landscaping &middot; <a href="https://azlawns.com" target="_blank">azlawns.com</a></div>
<div class="hero">
  <h1>Schedule Your Interview</h1>
  <p>Pick any available time below. These slots are confirmed open for both interviewers.</p>
</div>
<div class="info-bar">
  <div class="info-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    30 minutes
  </div>
  <div class="info-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
    Zoom link sent after booking
  </div>
  <div class="info-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Appointment Setter Role
  </div>
</div>
<div class="container" id="slotsContainer"></div>
<div class="footer-note">Times shown in Phoenix, AZ (MST) &middot; Availability as of April 07, 2026</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Confirm Your Time</h2>
    <div class="selected-time" id="modalTime"></div>
    <div class="selected-date" id="modalDate"></div>
    <button class="cta-btn" id="bookBtn">Continue to Book &rarr;</button>
    <button class="back-btn" id="backBtn">Go back</button>
  </div>
</div>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
<script>
const availableSlots = [
  { date: '2026-04-13', times: ['4:00 PM'] },
  { date: '2026-04-14', times: ['10:00 AM', '10:30 AM', '11:00 AM', '11:30 AM', '12:00 PM', '1:30 PM', '4:00 PM'] },
  { date: '2026-04-15', times: ['9:00 AM', '9:30 AM', '11:00 AM', '12:30 PM', '1:30 PM', '2:00 PM', '2:30 PM'] },
  { date: '2026-04-20', times: ['10:00 AM', '10:30 AM', '11:00 AM', '11:30 AM', '12:00 PM', '12:30 PM', '1:00 PM', '1:30 PM', '2:00 PM', '2:30 PM'] },
  { date: '2026-04-21', times: ['10:30 AM', '12:00 PM', '1:30 PM', '2:00 PM', '2:30 PM'] },
];

const container = document.getElementById('slotsContainer');
const overlay = document.getElementById('modalOverlay');
const modalTime = document.getElementById('modalTime');
const modalDate = document.getElementById('modalDate');
const bookBtn = document.getElementById('bookBtn');
const backBtn = document.getElementById('backBtn');

let selectedSlot = null;

const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const weekdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const fullMonths = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function parseDate(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function isToday(d) {
  const now = new Date();
  return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
}

function isPast(dateStr) {
  const d = parseDate(dateStr);
  const now = new Date();
  now.setHours(0,0,0,0);
  return d < now;
}

function render() {
  const future = availableSlots.filter(s => !isPast(s.date));
  if (future.length === 0) {
    container.innerHTML = '<div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><h2>No open slots right now</h2><p>Check back soon or reach out at <a href="https://azlawns.com">azlawns.com</a></p></div>';
    return;
  }
  let html = '';
  future.forEach(slot => {
    const d = parseDate(slot.date);
    const wd = weekdays[d.getDay()];
    const mn = months[d.getMonth()];
    const dn = d.getDate();
    const label = isToday(d) ? 'Today' : wd;
    const count = slot.times.length;
    html += '<div class="day-card"><div class="day-header"><div class="date-badge"><span class="month">'+mn+'</span><span class="day-num">'+dn+'</span></div><div class="day-info"><div class="weekday">'+label+'</div><div class="slot-count">'+count+' slot'+(count!==1?'s':'')+' available</div></div></div><div class="slots-grid">';
    slot.times.forEach(t => {
      html += '<button class="slot-btn" data-date="'+slot.date+'" data-time="'+t+'">'+t+'</button>';
    });
    html += '</div></div>';
  });
  container.innerHTML = html;

  container.querySelectorAll('.slot-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const dateStr = btn.dataset.date;
      const time = btn.dataset.time;
      const d = parseDate(dateStr);
      selectedSlot = { date: dateStr, time: time };
      modalTime.textContent = time;
      modalDate.textContent = weekdays[d.getDay()] + ', ' + fullMonths[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
      overlay.classList.add('active');
    });
  });
}

function closeModal() { overlay.classList.remove('active'); selectedSlot = null; }

overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
backBtn.addEventListener('click', closeModal);

bookBtn.addEventListener('click', () => {
  if (!selectedSlot) return;
  const d = parseDate(selectedSlot.date);
  const monthParam = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  const url = 'https://calendly.com/d/cxyz-jtx-662/setter-interview?month=' + monthParam;
  if (window.Calendly && window.Calendly.initPopupWidget) {
    window.Calendly.initPopupWidget({ url: url });
  } else {
    window.open(url, '_blank');
  }
  closeModal();
});

render();
</script>
</body>
</html>
