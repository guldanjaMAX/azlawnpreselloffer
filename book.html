<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Your Interview | AMS Landscaping</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f4f1;color:#1a2e1a;min-height:100vh}
.header{background:linear-gradient(135deg,#2d7a3a 0%,#1e5c28 100%);color:#fff;padding:2.5rem 1.5rem 2rem;text-align:center}
.header-label{font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;opacity:.85;margin-bottom:.75rem}
.header h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;margin-bottom:.5rem}
.header p{font-size:1rem;opacity:.88;max-width:480px;margin:0 auto;line-height:1.5}
.info-bar{display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;padding:1rem 1.5rem;background:#fff;border-bottom:1px solid #e2e8e3}
.info-item{display:flex;align-items:center;gap:.45rem;font-size:.85rem;color:#3a5a3a;font-weight:500}
.info-item svg{width:18px;height:18px;stroke:#2d7a3a;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.container{max-width:780px;margin:0 auto;padding:1.5rem 1rem 3rem}
.day-card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:1.25rem;overflow:hidden;border:1px solid #e6ede7}
.day-header{display:flex;align-items:center;gap:.75rem;padding:1rem 1.25rem;border-bottom:1px solid #eef3ef}
.date-badge{background:#2d7a3a;color:#fff;border-radius:10px;min-width:48px;text-align:center;padding:.35rem .55rem}
.date-badge .month{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;font-weight:600;line-height:1}
.date-badge .day-num{font-size:1.25rem;font-weight:800;line-height:1.2}
.day-name{font-weight:700;font-size:1.05rem;color:#1a2e1a}
.slot-count{font-size:.78rem;color:#6b8f6b;font-weight:500;margin-left:auto}
.slots{display:flex;flex-wrap:wrap;gap:.55rem;padding:1rem 1.25rem}
.slot-btn{background:#f0f7f1;border:1.5px solid #c8deca;color:#2d7a3a;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:600;padding:.55rem 1.1rem;border-radius:9px;cursor:pointer;transition:all .15s ease}
.slot-btn:hover{background:#2d7a3a;color:#fff;border-color:#2d7a3a;transform:translateY(-1px);box-shadow:0 3px 8px rgba(45,122,58,.25)}
.empty-state{text-align:center;padding:3rem 1.5rem;background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e6ede7}
.empty-state svg{width:48px;height:48px;stroke:#b0c8b0;fill:none;stroke-width:1.5;margin-bottom:1rem}
.empty-state p{color:#6b8f6b;font-size:1rem;line-height:1.5}
.footer-note{text-align:center;font-size:.78rem;color:#8a9f8a;margin-top:1.5rem;line-height:1.5}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px;max-width:400px;width:100%;padding:2rem;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.15);position:relative}
.modal h2{font-size:1.2rem;font-weight:700;color:#1a2e1a;margin-bottom:.35rem}
.modal .sel-time{font-size:1.05rem;color:#2d7a3a;font-weight:600;margin-bottom:1.5rem}
.modal .btn-book{display:inline-block;background:#2d7a3a;color:#fff;font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;padding:.85rem 2rem;border:none;border-radius:10px;cursor:pointer;transition:background .15s;width:100%;margin-bottom:.75rem}
.modal .btn-book:hover{background:#236b2e}
.modal .btn-back{background:none;border:none;color:#6b8f6b;font-family:'Inter',sans-serif;font-size:.88rem;cursor:pointer;font-weight:500}
.modal .btn-back:hover{color:#2d7a3a}
</style>
</head>
<body>
<div class="header">
<div class="header-label">AMS Landscaping &middot; azlawns.com</div>
<h1>Schedule Your Interview</h1>
<p>Pick any available time below. These slots are confirmed open for both interviewers.</p>
</div>
<div class="info-bar">
<div class="info-item">
<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
30 minutes
</div>
<div class="info-item">
<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
Zoom link sent after booking
</div>
<div class="info-item">
<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
Appointment Setter Role
</div>
</div>
<div class="container" id="slotsContainer"></div>

<div class="modal-overlay" id="modalOverlay">
<div class="modal">
<h2>Confirm Your Time</h2>
<div class="sel-time" id="selectedTime"></div>
<button class="btn-book" id="btnBook">Continue to Book &rarr;</button>
<button class="btn-back" id="btnBack">Go back</button>
</div>
</div>

<script>
const availableSlots = [
  { date: '2026-03-30', times: ['10:30 AM', '11:30 AM', '12:00 PM', '12:30 PM', '1:00 PM', '1:30 PM', '2:00 PM', '2:30 PM', '3:00 PM', '4:00 PM'] },
  { date: '2026-03-31', times: ['10:30 AM', '11:00 AM', '11:30 AM', '12:00 PM', '4:00 PM'] },
  { date: '2026-04-01', times: ['9:00 AM', '9:30 AM', '10:00 AM', '10:30 AM', '11:30 AM', '12:00 PM', '12:30 PM', '1:00 PM', '1:30 PM', '3:30 PM'] },
  { date: '2026-04-02', times: ['4:00 PM', '4:30 PM'] },
  { date: '2026-04-06', times: ['10:00 AM', '10:30 AM', '11:00 AM', '11:30 AM', '12:00 PM', '1:30 PM', '2:00 PM', '2:30 PM', '4:00 PM', '4:30 PM'] },
  { date: '2026-04-07', times: ['10:30 AM', '11:00 AM'] },
  { date: '2026-04-09', times: ['4:00 PM'] },
  { date: '2026-04-10', times: ['4:00 PM', '4:30 PM'] }
];

const WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function render() {
  const container = document.getElementById('slotsContainer');
  const now = new Date();
  const todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');

  const filtered = availableSlots.filter(d => d.date >= todayStr);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><p>No open slots right now \u2014 check back soon or reach out at azlawns.com</p></div>';
    container.innerHTML += '<div class="footer-note">Times shown in Phoenix, AZ (MST) \u00b7 Availability as of March 27, 2026</div>';
    return;
  }

  let html = '';
  filtered.forEach(day => {
    const parts = day.date.split('-');
    const dt = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    const weekday = WEEKDAYS[dt.getDay()];
    const month = MONTHS[dt.getMonth()];
    const dayNum = dt.getDate();
    const count = day.times.length;

    html += '<div class="day-card">';
    html += '<div class="day-header">';
    html += '<div class="date-badge"><div class="month">' + month.toUpperCase() + '</div><div class="day-num">' + dayNum + '</div></div>';
    html += '<div class="day-name">' + weekday + '</div>';
    html += '<div class="slot-count">' + count + ' slot' + (count !== 1 ? 's' : '') + '</div>';
    html += '</div>';
    html += '<div class="slots">';
    day.times.forEach(t => {
      html += '<button class="slot-btn" data-date="' + day.date + '" data-time="' + t + '">' + t + '</button>';
    });
    html += '</div></div>';
  });
  html += '<div class="footer-note">Times shown in Phoenix, AZ (MST) \u00b7 Availability as of March 27, 2026</div>';
  container.innerHTML = html;

  container.querySelectorAll('.slot-btn').forEach(btn => {
    btn.addEventListener('click', () => openModal(btn.dataset.date, btn.dataset.time));
  });
}

let selectedDate = '', selectedTimeStr = '';
function openModal(dateStr, time) {
  selectedDate = dateStr;
  selectedTimeStr = time;
  const parts = dateStr.split('-');
  const dt = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  const weekday = WEEKDAYS[dt.getDay()];
  const month = MONTHS[dt.getMonth()];
  document.getElementById('selectedTime').textContent = weekday + ', ' + month + ' ' + dt.getDate() + ' at ' + time;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

document.getElementById('btnBack').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

document.getElementById('btnBook').addEventListener('click', () => {
  const monthParam = selectedDate.substring(0,7);
  const url = 'https://calendly.com/d/cxyz-jtx-662/setter-interview?month=' + monthParam;
  if (window.Calendly && Calendly.initPopupWidget) {
    Calendly.initPopupWidget({ url: url });
  } else {
    window.open(url, '_blank');
  }
  closeModal();
});

render();
</script>
<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
</body>
</html>
