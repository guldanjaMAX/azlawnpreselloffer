<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Your Interview | AMS Landscaping</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#f0f4f0;color:#1a2e1a;min-height:100vh}
.top-bar{background:#2d7a3a;color:#fff;text-align:center;padding:10px 16px;font-size:13px;font-weight:500;letter-spacing:.3px}
.top-bar a{color:#b8e6c1;text-decoration:none}
.hero{background:linear-gradient(135deg,#2d7a3a 0%,#1d5c28 100%);color:#fff;padding:48px 24px 40px;text-align:center}
.hero h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;margin-bottom:8px;letter-spacing:-.5px}
.hero p{font-size:clamp(.95rem,2vw,1.1rem);opacity:.88;max-width:520px;margin:0 auto;line-height:1.5}
.info-bar{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;padding:20px 24px;background:#fff;border-bottom:1px solid #e2e8e2}
.info-item{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:#3a6b3a}
.info-item svg{width:18px;height:18px;stroke:#2d7a3a;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.container{max-width:720px;margin:0 auto;padding:24px 16px 48px}
.day-card{background:#fff;border-radius:12px;padding:20px 20px 16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);border:1px solid #e8efe8}
.day-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.date-badge{background:#eaf5ec;color:#2d7a3a;font-weight:700;font-size:13px;padding:6px 12px;border-radius:8px;white-space:nowrap}
.day-name{font-weight:700;font-size:1.05rem;color:#1a2e1a}
.slot-count{font-size:13px;color:#6b8f6b;margin-left:auto;font-weight:500}
.times-grid{display:flex;flex-wrap:wrap;gap:8px}
.time-btn{background:#f0f7f1;border:1.5px solid #c8e0cb;color:#2d7a3a;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;padding:10px 18px;border-radius:8px;cursor:pointer;transition:all .15s ease}
.time-btn:hover{background:#2d7a3a;color:#fff;border-color:#2d7a3a;transform:translateY(-1px);box-shadow:0 2px 8px rgba(45,122,58,.25)}
.time-btn:active{transform:translateY(0)}
.empty-state{text-align:center;padding:48px 24px;background:#fff;border-radius:12px;border:1px solid #e8efe8}
.empty-state p{color:#6b8f6b;font-size:15px;line-height:1.6}
.footer-note{text-align:center;padding:16px;font-size:13px;color:#6b8f6b;margin-top:8px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px;padding:32px 28px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:1.2rem;font-weight:700;margin-bottom:4px;color:#1a2e1a}
.modal .selected-time{font-size:1.5rem;font-weight:800;color:#2d7a3a;margin:12px 0 20px}
.modal .cta-btn{display:inline-block;background:#2d7a3a;color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;padding:14px 32px;border-radius:10px;border:none;cursor:pointer;transition:background .15s;width:100%}
.modal .cta-btn:hover{background:#236b2e}
.modal .back-btn{display:inline-block;margin-top:12px;font-size:14px;color:#6b8f6b;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;font-weight:500}
.modal .back-btn:hover{color:#2d7a3a}
</style>
</head>
<body>
<div class="top-bar">AMS Landscaping &middot; <a href="https://azlawns.com" target="_blank">azlawns.com</a></div>
<div class="hero">
  <h1>Schedule Your Interview</h1>
  <p>Pick any available time below. These slots are confirmed open for both interviewers.</p>
</div>
<div class="info-bar">
  <div class="info-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    30 minutes
  </div>
  <div class="info-item">
    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    Zoom link sent after booking
  </div>
  <div class="info-item">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Appointment Setter Role
  </div>
</div>
<div class="container" id="slotsContainer"></div>
<div class="footer-note">Times shown in Phoenix, AZ (MST) &middot; Availability as of April 13, 2026</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Confirm Your Time</h2>
    <div class="selected-time" id="selectedTime"></div>
    <button class="cta-btn" id="bookBtn">Continue to Book &rarr;</button>
    <button class="back-btn" id="backBtn">Go back</button>
  </div>
</div>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
<script>
const availableSlots = [
  { date: '2026-04-13', times: ['3:00 PM', '4:00 PM'] },
  { date: '2026-04-14', times: ['11:00 AM', '11:30 AM', '12:00 PM', '1:30 PM', '4:00 PM'] },
  { date: '2026-04-15', times: ['12:30 PM', '3:00 PM', '3:30 PM'] },
  { date: '2026-04-20', times: ['10:00 AM', '10:30 AM', '11:00 AM', '11:30 AM', '12:00 PM', '12:30 PM', '1:00 PM', '1:30 PM', '2:00 PM', '2:30 PM'] },
  { date: '2026-04-21', times: ['10:30 AM', '12:00 PM', '1:30 PM', '2:00 PM', '2:30 PM'] },
  { date: '2026-04-22', times: ['9:30 AM', '11:00 AM', '11:30 AM', '12:00 PM', '12:30 PM', '1:00 PM', '1:30 PM', '3:30 PM', '4:00 PM'] },
  { date: '2026-04-23', times: ['9:30 AM', '1:30 PM', '2:00 PM', '2:30 PM', '3:00 PM', '3:30 PM', '4:00 PM'] },
  { date: '2026-04-24', times: ['9:00 AM', '9:30 AM', '10:00 AM', '10:30 AM', '11:00 AM', '11:30 AM', '12:00 PM', '12:30 PM', '2:00 PM', '2:30 PM', '3:00 PM', '3:30 PM', '4:00 PM', '4:30 PM'] },
  { date: '2026-04-27', times: ['10:00 AM', '10:30 AM', '11:00 AM', '11:30 AM', '12:00 PM', '12:30 PM', '1:00 PM', '1:30 PM', '2:00 PM', '2:30 PM', '3:00 PM', '4:00 PM'] }
];

const WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function formatDateLabel(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return { weekday: WEEKDAYS[dt.getDay()], label: MONTHS[dt.getMonth()] + ' ' + d + ', ' + y };
}

function isToday(dateStr) {
  const now = new Date();
  const [y,m,d] = dateStr.split('-').map(Number);
  return now.getFullYear()===y && now.getMonth()===m-1 && now.getDate()===d;
}

function isPast(dateStr) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const [y,m,d] = dateStr.split('-').map(Number);
  const slotDate = new Date(y, m-1, d);
  return slotDate < today;
}

function render() {
  const container = document.getElementById('slotsContainer');
  const future = availableSlots.filter(s => !isPast(s.date));
  if (future.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>No open slots right now. Check back soon or reach out at <a href="https://azlawns.com" style="color:#2d7a3a;font-weight:600">azlawns.com</a></p></div>';
    return;
  }
  let html = '';
  future.forEach(day => {
    const {weekday, label} = formatDateLabel(day.date);
    html += '<div class="day-card">';
    html += '<div class="day-header">';
    html += '<span class="date-badge">' + label + '</span>';
    html += '<span class="day-name">' + weekday + '</span>';
    html += '<span class="slot-count">' + day.times.length + ' slot' + (day.times.length>1?'s':'') + '</span>';
    html += '</div><div class="times-grid">';
    day.times.forEach(t => {
      html += '<button class="time-btn" data-date="' + day.date + '" data-time="' + t + '">' + t + '</button>';
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

let chosenDate = '', chosenTime = '';
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('time-btn')) {
    chosenDate = e.target.dataset.date;
    chosenTime = e.target.dataset.time;
    const {weekday, label} = formatDateLabel(chosenDate);
    document.getElementById('selectedTime').textContent = weekday + ', ' + label + ' at ' + chosenTime;
    document.getElementById('modalOverlay').classList.add('active');
  }
});

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('active');
});
document.getElementById('backBtn').addEventListener('click', function() {
  document.getElementById('modalOverlay').classList.remove('active');
});
document.getElementById('bookBtn').addEventListener('click', function() {
  const [y,m] = chosenDate.split('-');
  const monthParam = y + '-' + m;
  const url = 'https://calendly.com/d/cxyz-jtx-662/setter-interview?month=' + monthParam;
  if (window.Calendly && Calendly.initPopupWidget) {
    Calendly.initPopupWidget({url: url});
  } else {
    window.open(url, '_blank');
  }
  document.getElementById('modalOverlay').classList.remove('active');
});

render();
</script>
</body>
</html>
