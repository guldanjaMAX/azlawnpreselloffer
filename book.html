<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Your Interview | AMS Landscaping</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#f0f4f1;color:#1a2e1a;min-height:100vh}
.header{background:linear-gradient(135deg,#2d7a3a 0%,#1e5c28 100%);color:#fff;padding:48px 24px 40px;text-align:center}
.header-label{font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;margin-bottom:16px}
.header h1{font-size:clamp(28px,5vw,42px);font-weight:800;margin-bottom:12px;line-height:1.15}
.header p{font-size:17px;opacity:.85;max-width:520px;margin:0 auto;line-height:1.5}
.info-bar{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;padding:20px 24px;background:#fff;border-bottom:1px solid #e0e8e0}
.info-item{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:#3a6b3a}
.info-item svg{width:18px;height:18px;flex-shrink:0}
.container{max-width:720px;margin:0 auto;padding:32px 20px 60px}
.day-card{background:#fff;border-radius:16px;padding:28px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.day-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.date-badge{background:#e8f5e9;color:#2d7a3a;font-size:13px;font-weight:700;padding:6px 14px;border-radius:8px;white-space:nowrap}
.day-name{font-size:20px;font-weight:700;color:#1a2e1a}
.slot-count{font-size:13px;color:#6b8f6b;font-weight:500;margin-left:auto}
.slots{display:flex;flex-wrap:wrap;gap:10px}
.slot-btn{background:#f0f8f1;border:2px solid #c8e6c9;color:#2d7a3a;font-family:Inter,sans-serif;font-size:15px;font-weight:600;padding:12px 22px;border-radius:10px;cursor:pointer;transition:all .15s ease}
.slot-btn:hover{background:#2d7a3a;color:#fff;border-color:#2d7a3a;transform:translateY(-1px);box-shadow:0 4px 12px rgba(45,122,58,.25)}
.footer{text-align:center;padding:20px;font-size:13px;color:#7a9a7a}
.empty-state{background:#fff;border-radius:16px;padding:48px 28px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.empty-state h2{font-size:22px;font-weight:700;margin-bottom:10px;color:#1a2e1a}
.empty-state p{color:#6b8f6b;font-size:16px;line-height:1.5}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:20px;padding:36px;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:22px;font-weight:700;margin-bottom:6px}
.modal .selected-time{font-size:17px;color:#2d7a3a;font-weight:600;margin-bottom:24px}
.modal .cta{display:inline-block;background:#2d7a3a;color:#fff;font-family:Inter,sans-serif;font-size:16px;font-weight:700;padding:16px 36px;border-radius:12px;border:none;cursor:pointer;transition:background .15s}
.modal .cta:hover{background:#236b2e}
.modal .back{display:block;margin-top:14px;font-size:14px;color:#6b8f6b;cursor:pointer;border:none;background:none;font-family:Inter,sans-serif}
.modal .back:hover{color:#2d7a3a}
</style>
</head>
<body>
<div class="header">
<div class="header-label">AMS Landscaping &middot; azlawns.com</div>
<h1>Schedule Your Interview</h1>
<p>Pick any available time below. These slots are confirmed open for both interviewers.</p>
</div>
<div class="info-bar">
<div class="info-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>30 minutes</div>
<div class="info-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Zoom link sent after booking</div>
<div class="info-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Appointment Setter Role</div>
</div>
<div class="container" id="slotsContainer"></div>
<div class="footer">Times shown in Phoenix, AZ (MST) &middot; Availability as of April 08, 2026</div>
<div class="modal-overlay" id="modalOverlay">
<div class="modal">
<h2>Confirm Your Time</h2>
<div class="selected-time" id="selectedTime"></div>
<button class="cta" id="ctaBtn">Continue to Book &rarr;</button>
<button class="back" id="backBtn">Go back</button>
</div>
</div>
<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
<script>
const availableSlots=[
{date:"2026-04-13",times:["4:00 PM"]},
{date:"2026-04-14",times:["10:00 AM","1:30 PM","4:00 PM"]},
{date:"2026-04-15",times:["9:00 AM","9:30 AM","11:00 AM","12:30 PM","3:00 PM","3:30 PM"]},
{date:"2026-04-20",times:["10:00 AM","10:30 AM","11:00 AM","11:30 AM","12:00 PM","12:30 PM","1:00 PM","1:30 PM","2:00 PM","2:30 PM"]},
{date:"2026-04-21",times:["10:30 AM","12:00 PM","1:30 PM","2:00 PM","2:30 PM"]},
{date:"2026-04-22",times:["9:00 AM","9:30 AM","11:00 AM","11:30 AM","12:00 PM","12:30 PM","1:00 PM","1:30 PM","3:30 PM","4:00 PM"]}
];
const container=document.getElementById("slotsContainer");
const overlay=document.getElementById("modalOverlay");
const selectedTimeEl=document.getElementById("selectedTime");
const ctaBtn=document.getElementById("ctaBtn");
const backBtn=document.getElementById("backBtn");
const weekdays=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
function formatDate(ds){const[y,m,d]=ds.split("-").map(Number);const dt=new Date(y,m-1,d);return{weekday:weekdays[dt.getDay()],month:months[dt.getMonth()],day:d,year:y,dateObj:dt}}
const today=new Date();today.setHours(0,0,0,0);
const filtered=availableSlots.filter(s=>{const[y,m,d]=s.date.split("-").map(Number);return new Date(y,m-1,d)>=today});
if(filtered.length===0){container.innerHTML="<div class="empty-state"><h2>No open slots right now</h2><p>Check back soon or reach out at azlawns.com</p></div>"}
else{filtered.forEach(s=>{const f=formatDate(s.date);const card=document.createElement("div");card.className="day-card";card.innerHTML="<div class="day-header"><span class="date-badge">"+f.month+" "+f.day+"</span><span class="day-name">"+f.weekday+"</span><span class="slot-count">"+s.times.length+" slot"+(s.times.length>1?"s":"")+"</span></div><div class="slots">"+s.times.map(t=>"<button class="slot-btn" data-date=""+s.date+"" data-time=""+t+"">"+t+"</button>").join("")+"</div>";container.appendChild(card)})}
let chosenDate="",chosenTime="";
container.addEventListener("click",function(e){if(e.target.classList.contains("slot-btn")){chosenDate=e.target.dataset.date;chosenTime=e.target.dataset.time;const f=formatDate(chosenDate);selectedTimeEl.textContent=f.weekday+", "+f.month+" "+f.day+" at "+chosenTime+" MST";overlay.classList.add("active")}});
overlay.addEventListener("click",function(e){if(e.target===overlay)overlay.classList.remove("active")});
backBtn.addEventListener("click",function(){overlay.classList.remove("active")});
ctaBtn.addEventListener("click",function(){const[y,m]=chosenDate.split("-");const monthParam=y+"-"+m;const url="https://calendly.com/d/cxyz-jtx-662/setter-interview?month="+monthParam;if(window.Calendly&&Calendly.initPopupWidget){Calendly.initPopupWidget({url:url});overlay.classList.remove("active")}else{window.open(url,"_blank");overlay.classList.remove("active")}});
</script>
</body>
</html>
